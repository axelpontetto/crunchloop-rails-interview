default: &default
  adapter: sqlite3
  encoding: unicode
  host: 127.0.0.1
  username: postgres
  password: postgres
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Solid Queue runs several OS processes (dispatcher/worker/scheduler) against
  # this same SQLite file; without a busy timeout, concurrent writes raise
  # SQLite3::BusyException instead of waiting briefly for the lock to clear.
  timeout: 5000

development:
  <<: *default
  database: rails_interview_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: rails_interview_test